<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
   <link rel="stylesheet" href="css/Login-Register.css">
   <title>Увійти</title>
</head>
<body>
   <form>
      <div class="container">
         <div class="logging-box">
            <div class="logging-header">
               <span>Увійти</span>
            </div>

            <!-- Email -->
             <div class="input-box">
                  <input type="email" id="user" class="input-field" placeholder=" " required>
                  <label for="user" class="label">Ел.пошта:</label>
                  <i class='bx bx-user'></i>
            </div>

             <!-- Password -->
             <div class="input-box">
                  <input type="password" id="password" class="input-field" placeholder=" " required>
                  <label for="password" class="label">Пароль:</label>
                  <i class='bx bx-lock'></i>
            </div>

              <!-- Remember/Forgot -->
                  <div class="remember-me">
                     <label for="remember">Запам'ятати мене</label>
                     <input type="checkbox" id="remember">
                  </div>

               <div class="input-box">
                  <input type="submit" class="input-submit" value="Увійти">
               </div>

               <div class="register">
                  <span>Не маєте аккаунту? <a href="Register.html">Зареєструватися</a></span>
               </div>
         </div>
      </div>
   </form>
</body>
</html>
