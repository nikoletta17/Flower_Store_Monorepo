<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
   <link rel="stylesheet" href="css/Login-Register.css">
   <title>Зареєструватися</title>
</head>
<body>
   <form>
      <div class="container">
         <div class="logging-box">
            <div class="logging-header">
              <span>Реєстрація</span>
            </div>
             <!-- Email -->
              <div class="input-box">
                  <input type="email" id="user" class="input-field" placeholder=" " required>
                  <label for="user" class="label">Ел.пошта:</label>
                  <i class='bx bx-user'></i>
              </div>

              <!-- Password -->
               <div class="input-box">
                  <input type="password" id="password" class="input-field" placeholder=" " required>
                  <label for="password" class="label">Пароль:</label>
                  <i class='bx bx-lock'></i>
               </div>

               <div class="input-box">
                  <input type="password" id="conf-password" class="input-field" placeholder=" " required>
                  <label for="conf-password" class="label">Повторити:</label>
                  <i class='bx bx-lock'></i>
               </div>

               <div class="gender">
                  <input type="radio" name="gender">
                  <label>Чоловік</label>

                  <input type="radio" name="gender">
                  <label>Жінка</label>
               </div>

               <div class="input-box">
                  <input type="submit" class="input-submit" value="Зареєструватися">
               </div>

         </div>
      </div>
   </form>
</body>
</html>
