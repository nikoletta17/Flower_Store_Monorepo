<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оформлення замовлення | Whisper of Flower</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* Фіксуємо висоту на 100vh */
      html,
      body {
        height: 100vh;
        margin: 0;
        overflow: hidden; /* Забороняємо скрол сторінки */
      }

      body {
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        cursor: none;
      }

      header {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
      }

      main.container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 60px; /* Місце для хедера */
      }

      .order-form-container {
        width: 100%;
        max-width: 500px;
        padding: 35px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 15px 35px rgba(var(--accent-1) / 0.1);
      }

      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: rgb(var(--text) / 0.8);
        font-size: 0.9rem;
      }

      .delivery-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 5px;
      }
      .delivery-options input[type="radio"] {
        display: none;
      }
      .delivery-label {
        display: block;
        padding: 12px;
        text-align: center;
        background: white;
        border: 2px solid transparent;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.85rem;
      }
      .delivery-options input[type="radio"]:checked + .delivery-label {
        border-color: rgb(var(--accent-1));
        background: rgba(var(--accent-1) / 0.1);
        color: rgb(var(--accent-1));
        font-weight: bold;
      }

      select,
      input[type="text"],
      input[type="tel"] {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(var(--accent-1) / 0.3);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        outline: none;
      }

      select:focus,
      input:focus {
        border-color: rgb(var(--accent-1));
      }

      .hidden {
        display: none;
      }
      .order-confirm-btn {
        width: 100%;
        margin-top: 15px;
        padding: 14px;
        font-weight: bold;
      }

      #pickup-info {
        font-size: 0.85rem;
        color: #666;
        background: rgba(255, 255, 255, 0.5);
        padding: 12px;
        border-radius: 10px;
        border: 1px dashed rgb(var(--accent-1));
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="mouse__cursor"></div>

    <header>
      <nav class="nav">
        <div class="logo">W&F</div>
        <ul class="nav-links">
          <li><a href="cart.html">← Назад</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div class="order-form-container animate show">
        <h2
          class="gradient-header"
          style="font-size: 2rem; margin-bottom: 25px"
        >
          Оформлення
        </h2>

        <form id="final-order-form">
          <div class="form-group">
            <label>Спосіб отримання</label>
            <div class="delivery-options">
              <input
                type="radio"
                name="delivery_type"
                value="pickup"
                id="type-pickup"
                checked
              />
              <label for="type-pickup" class="delivery-label">
                <i class="fas fa-store"></i> Самовивіз
              </label>

              <input
                type="radio"
                name="delivery_type"
                value="courier"
                id="type-courier"
              />
              <label for="type-courier" class="delivery-label">
                <i class="fas fa-truck"></i> Доставка
              </label>
            </div>
          </div>

          <div id="address-section" class="hidden">
            <div class="form-group">
              <label>Місто</label>
              <select id="city-select">
                <option value="Дніпро">Дніпро</option>
                <option value="Київ">Київ</option>
                <option value="Львів">Львів</option>
                <option value="Одеса">Одеса</option>
              </select>
            </div>
            <div class="form-group">
              <label>Вулиця та будинок</label>
              <input
                type="text"
                id="street-address"
                placeholder="Наприклад: вул. Садова, 12"
              />
            </div>
          </div>

          <div class="form-group" id="pickup-info">
            <i
              class="fas fa-location-dot"
              style="color: rgb(var(--accent-1))"
            ></i>
            м. Дніпро, пл. Успенська, 7. Пн-Нд 09:00-21:00
          </div>

          <div class="form-group">
            <label>Ваш телефон</label>
            <input
              type="tel"
              id="delivery-phone"
              placeholder="+380..."
              required
            />
          </div>

          <button type="submit" class="primary-cta order-confirm-btn">
            Підтвердити замовлення
          </button>
        </form>
      </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/mouseCursor.js"></script>
    <script>
      const pickupRadio = document.getElementById("type-pickup");
      const courierRadio = document.getElementById("type-courier");
      const addressSection = document.getElementById("address-section");
      const pickupInfo = document.getElementById("pickup-info");
      const streetInput = document.getElementById("street-address");

      // Оновлена функція перемикання
      const toggleDelivery = () => {
        console.log("Перемикаю режим. Кур'єр обрано:", courierRadio.checked); // Для перевірки в консолі

        if (courierRadio.checked) {
          addressSection.style.display = "block"; // Пряме керування замість класу
          pickupInfo.style.display = "none";
          streetInput.setAttribute("required", "true");
        } else {
          addressSection.style.display = "none";
          pickupInfo.style.display = "block";
          streetInput.removeAttribute("required");
          streetInput.value = "";
        }
      };

      // Додаємо слухачі на обидва варіанти
      pickupRadio.addEventListener("click", toggleDelivery);
      courierRadio.addEventListener("click", toggleDelivery);

      // Викликаємо один раз при завантаженні, щоб встановити початковий стан
      toggleDelivery();

      // Відправка замовлення (залишається як була)
      document
        .getElementById("final-order-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const token = localStorage.getItem("access_token");

          const deliveryType = document.querySelector(
            'input[name="delivery_type"]:checked',
          ).value;
          const phone = document.getElementById("delivery-phone").value;

          let finalAddress = "";
          if (deliveryType === "pickup") {
            finalAddress = "Самовивіз: пл. Успенська, 7";
          } else {
            const city = document.getElementById("city-select").value;
            const street = streetInput.value.trim();

            if (!street) {
              alert("Будь ласка, введіть адресу для доставки!");
              streetInput.focus();
              return;
            }
            finalAddress = `Доставка кур'єром: м. ${city}, ${street}`;
          }

          const orderData = {
            delivery_address: finalAddress,
            phone_number: phone,
          };

          try {
            const response = await fetch(`${BASE_URL}/orders/checkout`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(orderData),
            });

            if (response.ok) {
              const order = await response.json();
              alert(`💐 Замовлення №${order.id} оформлено успішно!`);
              window.location.href = "index.html#bouquet-section";
            } else {
              const err = await response.json();
              alert(`Помилка: ${err.detail}`);
            }
          } catch (error) {
            console.error("Error:", error);
            alert("Помилка з'єднання з бекендом.");
          }
        });
    </script>
  </body>
</html>
