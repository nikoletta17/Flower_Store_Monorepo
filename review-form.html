<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/review-form.css">
  <title>Залишити відгук</title>
</head>
<body>
  <div class="review-form-container">
    <h2>Залишити відгук</h2>
    <form>
      <label for="name">Ваше ім’я:</label>
      <input type="text" id="name" name="name" placeholder="Введіть ваше ім’я" required>

      <label for="email">Електронна пошта:</label>
      <input type="email" id="email" name="email" placeholder="whisperofflower@gmail.com" required>

      <label for="message">Ваш відгук:</label>
      <textarea id="message" name="message" rows="5" placeholder="Поділіться вашими враженнями..." required></textarea>

      <button type="submit" class="submit-btn">Надіслати</button>
    </form>
  </div>
</body>
</html>
