<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Мій Кабінет | Whisper of Flower</title>
    <style>
      body {
        background-color: var(--bg-color);
        padding-top: 100px;
        cursor: none;
        min-height: 100vh;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        padding: 20px;
        /* Це змушує обидві колонки бути однакової висоти */
        align-items: stretch; 
      }

      .card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 30px rgba(var(--accent-1) / 0.1);
        display: flex;
        flex-direction: column;
      }

      h2 {
        font-size: 2rem !important;
        margin-top: 0;
        margin-bottom: 20px;
        background: linear-gradient(
          135deg,
          rgb(var(--gr-color-pink)),
          rgb(var(--gr-color-green))
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        flex-shrink: 0; /* Заголовок не стискається */
      }

      /* --- ОСЬ ТУТ МАГІЯ ОДНАКОВОЇ ВИСОТИ ТА СКРОЛУ --- */
      .orders-wrapper {
        flex-grow: 1;      /* Займає все місце, що залишилося в картці */
        overflow-y: auto;  /* Вмикає прокрутку тільки тут */
        padding-right: 10px;
        max-height: 450px; /* Обмежуємо висоту, щоб вона збігалася з карткою профілю */
      }

      /* Красивий скролбар під твій стиль */
      .orders-wrapper::-webkit-scrollbar {
        width: 5px;
      }
      .orders-wrapper::-webkit-scrollbar-thumb {
        background: rgba(var(--accent-1), 0.5);
        border-radius: 10px;
      }
      /* ------------------------------------------- */

      .form-group { margin-bottom: 20px; }
      label {
        font-size: 0.9rem;
        font-weight: 600;
        color: rgb(var(--text) / 0.7);
        margin-bottom: 8px;
        display: block;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid rgba(var(--accent-1) / 0.3);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.8);
      }

      button#saveBtn {
        background: linear-gradient(135deg, rgb(var(--accent-1)), rgb(var(--gr-color-pink)));
        color: white;
        border-radius: 15px;
        font-weight: bold;
        border: none;
        padding: 12px;
        width: 100%;
        cursor: pointer;
      }

      .order-item {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 12px;
      }

      @media (max-width: 850px) {
        .container { grid-template-columns: 1fr; }
        .orders-wrapper { max-height: 400px; }
      }
    </style>
  </head>
  <body>
    <div class="mouse__cursor"></div>

    <header>
      <nav class="nav">
        <div class="logo">W&F</div>
        <ul class="nav-links">
          <li><a href="index.html#intro">Головна</a></li>
          <li><a href="index.html#bouquet-section">Каталог</a></li>
        </ul>
        <ul class="auth-links" id="auth-links-container"></ul>
      </nav>
    </header>

    <div class="container">
      <div class="card animate show">
        <h2>Мій Профіль</h2>
        <form id="profileForm">
          <div class="form-group">
            <label>Ім'я</label>
            <input type="text" id="nameInput" required />
          </div>
          <div class="form-group">
            <label>Електронна пошта</label>
            <input type="email" id="emailInput" required />
          </div>
          <p style="font-size: 12px; color: rgba(var(--text) / 0.5); margin: 15px 0 10px;">
            Для зміни пароля:
          </p>
          <div class="form-group">
            <input type="password" id="passwordInput" placeholder="Новий пароль" />
          </div>
          <button type="submit" id="saveBtn">Зберегти зміни</button>
        </form>
        <button onclick="requestPasswordReset()" style="margin-top: 10px; background: none; border: none; color: #888; font-size: 13px; text-decoration: underline; cursor: pointer; width: 100%;">
            Забули пароль?
        </button>
      </div>

      <div class="card animate show" style="transition-delay: 0.2s;">
        <h2>Історія замовлень</h2>
        <div id="ordersContainer" class="orders-wrapper">
            Завантаження...
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/mouseCursor.js"></script>
  </body>
</html>
